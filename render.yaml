services:
  - type: web
    name: fortismkt-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app.database import engine, Base; import app.models; Base.metadata.create_all(engine)" && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fortismkt-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://your-frontend-domain.com

databases:
  - name: fortismkt-db
    plan: free
